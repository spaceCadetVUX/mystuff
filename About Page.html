// ---------- Utilities ----------
function cn(...xs){ return xs.filter(Boolean).join(' '); }

function hexToHsl(hex){
  let h = hex.replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const r = parseInt(h.slice(0,2),16)/255;
  const g = parseInt(h.slice(2,4),16)/255;
  const b = parseInt(h.slice(4,6),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let H,S,L=(max+min)/2;
  if(max===min){ H=0; S=0; }
  else {
    const d=max-min;
    S = L>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: H=((g-b)/d + (g<b?6:0)); break;
      case g: H=((b-r)/d + 2); break;
      default: H=((r-g)/d + 4);
    }
    H/=6;
  }
  return `${Math.round(H*360)} ${Math.round(S*100)}% ${Math.round(L*100)}%`;
}

// ---------- Stat counter ----------
function Stat({label, value, delay=0}){
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(()=>{
    const io = new IntersectionObserver(([e])=>{ if(e.isIntersecting){ setShown(true); io.disconnect(); }},{threshold:.3});
    if(ref.current) io.observe(ref.current);
    return ()=> io.disconnect();
  },[]);
  // parse numeric prefix
  const m = value.match(/^([\d,.]+)(.*)$/);
  const target = m ? parseFloat(m[1].replace(/,/g,'')) : 0;
  const suffix = m ? m[2] : value;
  const [n, setN] = useState(0);
  useEffect(()=>{
    if(!shown) return;
    const t0 = performance.now(); const dur = 1200;
    let raf; const tick = t => {
      const p = Math.min(1,(t-t0)/dur);
      const eased = 1 - Math.pow(1-p,3);
      setN(target * eased);
      if(p<1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return ()=> cancelAnimationFrame(raf);
  },[shown,target]);
  const display = Number.isInteger(target) ? Math.round(n).toLocaleString() : n.toFixed(1);
  return (
    <div ref={ref} className={cn("relative py-8 md:py-10", shown && "fade-up")} style={{animationDelay: delay+'ms'}}>
      <div className="font-serif-display text-5xl md:text-6xl leading-none text-foreground">
        {display}<span className="text-primary">{suffix}</span>
      </div>
      <div className="mt-3 text-xs uppercase tracking-[0.14em] text-muted-foreground">{label}</div>
    </div>
  );
}

          <p className="mt-2 text-sm text-white/80 max-w-sm">{body}</p>
          <button className="mt-4 inline-flex items-center gap-1 text-sm text-white/90 hover:text-white">
            {cta} <ChevronRight className="size-4 transition-transform group-hover:translate-x-0.5"/>
          </button>
        </div>
      </div>
    );
  }
  return (
    <div className={cn("group relative overflow-hidden rounded-xl shadow-lg transition-transform duration-300 hover:-translate-y-0.5",
        dark ? "bg-black text-white" : "bg-muted text-foreground")}>
      <div className="relative overflow-hidden">
        <div className="transition-transform duration-500 group-hover:scale-[1.04]">{image}</div>
        <div className="absolute bottom-0 h-32 w-full bg-gradient-to-t from-black via-black/60 to-transparent pointer-events-none"/>
      </div>
      <div className="p-6">
        <h3 className="font-serif-display text-2xl">{title}</h3>
        <p className={cn("mt-2 text-sm max-w-sm", dark ? "text-white/70" : "text-muted-foreground")}>{body}</p>
        <Button variant="outline" size="sm" className={cn("mt-4", dark && "bg-transparent text-white border-white/30 hover:bg-white hover:text-black")}>
          {cta}
        </Button>
      </div>
    </div>
  );
}

// ---------- Footer strip ----------
function Footer(){
  return (
    <footer className="border-t border-border">
      <div className="mx-auto max-w-6xl px-6 py-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 text-sm text-muted-foreground">
        <div className="flex items-center gap-2">
          <span className="grid place-items-center size-6 rounded-md bg-foreground text-background">
            <svg viewBox="0 0 24 24" className="size-3.5" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4 20 L12 4 L20 20 Z"/><path d="M8 20 L16 20"/></svg>
          </span>
          <span className="font-serif-display text-base text-foreground leading-none">Lyra</span>
          <span className="ml-3">© 2026</span>
        </div>
        <div className="flex gap-6">
          <a href="#" className="hover:text-foreground">Platform</a>
          <a href="#" className="hover:text-foreground">Research</a>
          <a href="#" className="hover:text-foreground">Trust</a>
          <a href="#" className="hover:text-foreground">Careers</a>
        </div>
      </div>
    </footer>
  );
}

// ---------- Tweaks Panel ----------
function TweaksPanel({open, onClose, tweaks, setTweak, onReset}){
  const presets = ['#d97757','#6366f1','#10b981','#f59e0b','#ef4444','#0ea5e9','#111111'];
  return (
    <div className={cn("fixed right-4 bottom-4 z-50 w-[300px] rounded-xl border border-border bg-background shadow-2xl shadow-black/20 transition-all", open ? "opacity-100 translate-y-0" : "opacity-0 pointer-events-none translate-y-2")}>
      <div className="flex items-center justify-between px-4 py-3 border-b border-border">
        <div className="flex items-center gap-2">
          <Sparkle className="size-4 text-primary"/>
          <span className="text-sm font-medium">Tweaks</span>
        </div>
        <button onClick={onClose} className="text-xs text-muted-foreground hover:text-foreground">Close</button>
      </div>
      <div className="p-4 space-y-5 text-sm">
        <Row label="Theme">
          <Seg value={tweaks.theme} onChange={v=>setTweak('theme',v)} options={[['light','Light'],['dark','Dark']]}/>
        </Row>
        <Row label="Primary">
          <div className="flex flex-wrap gap-1.5">
            {presets.map(c=>(
              <button key={c} onClick={()=>setTweak('primary',c)} className={cn("size-6 rounded-full border border-black/10 ring-offset-2 ring-offset-background", tweaks.primary===c && "ring-2 ring-foreground")} style={{background:c}}/>
            ))}
            <input type="color" value={tweaks.primary} onChange={e=>setTweak('primary', e.target.value)} className="size-6 rounded-full overflow-hidden cursor-pointer border border-border"/>
          </div>
        </Row>
        <Row label="Stats row">
          <Toggle value={tweaks.showStats} onChange={v=>setTweak('showStats',v)}/>
        </Row>
        <Row label="Hero layout">
          <Seg value={tweaks.heroLayout} onChange={v=>setTweak('heroLayout',v)} options={[['overlay','Overlay'],['stacked','Stacked']]}/>
        </Row>
        <Row label="About layout">
          <Seg value={tweaks.aboutLayout} onChange={v=>setTweak('aboutLayout',v)} options={[['split-right','Right'],['split-left','Left'],['stack','Stack']]}/>
        </Row>
        <div className="pt-2 border-t border-border space-y-2">
          <Field label="Headline" value={tweaks.headline} onChange={v=>setTweak('headline',v)} area/>
          <Field label="Accent word" value={tweaks.headlineAccent} onChange={v=>setTweak('headlineAccent',v)}/>
          <Field label="Subhead" value={tweaks.subhead} onChange={v=>setTweak('subhead',v)} area/>
        </div>
        <button onClick={onReset} className="w-full text-xs text-muted-foreground hover:text-foreground border border-border rounded-md py-1.5">Reset tweaks</button>
      </div>
    </div>
  );
}
function Row({label, children}){
  return <div className="flex items-center justify-between gap-3"><span className="text-muted-foreground text-xs uppercase tracking-wider">{label}</span><div>{children}</div></div>;
}
function Seg({value, onChange, options}){
  return (
    <div className="inline-flex rounded-md border border-border p-0.5 bg-muted/50">
      {options.map(([v,l])=>(
        <button key={v} onClick={()=>onChange(v)} className={cn("px-2.5 py-1 text-xs rounded-sm", value===v ? "bg-background shadow-sm text-foreground":"text-muted-foreground")}>{l}</button>
      ))}
    </div>
  );
}
function Toggle({value, onChange}){
  return (
    <button onClick={()=>onChange(!value)} className={cn("relative w-9 h-5 rounded-full transition-colors", value ? "bg-primary" : "bg-muted border border-border")}>
      <span className={cn("absolute top-0.5 size-4 rounded-full bg-white shadow transition-all", value ? "left-4" : "left-0.5")}/>
    </button>
  );
}
function Field({label, value, onChange, area}){
  return (
    <label className="block">
      <div className="text-[10px] uppercase tracking-wider text-muted-foreground mb-1">{label}</div>
      {area
        ? <textarea value={value} onChange={e=>onChange(e.target.value)} rows={2} className="w-full text-xs rounded-md border border-border bg-background px-2 py-1.5 resize-y"/>
        : <input value={value} onChange={e=>onChange(e.target.value)} className="w-full text-xs rounded-md border border-border bg-background px-2 py-1.5"/>}
    </label>
  );
}

// ---------- App ----------
function App(){
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Apply theme + primary to :root
  useEffect(()=>{
    document.documentElement.classList.toggle('dark', tweaks.theme==='dark');
    document.documentElement.style.setProperty('--primary', hexToHsl(tweaks.primary));
  },[tweaks.theme, tweaks.primary]);

  // Host Tweaks protocol
  useEffect(()=>{
    const onMsg = e => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  },[]);

  const setTweak = (k,v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]: v } }, '*');
      return next;
    });
  };
  const onReset = () => {
    setTweaks(TWEAK_DEFAULTS);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: TWEAK_DEFAULTS }, '*');
  };

  const achievements = [
    { label:"Teams building on Lyra", value:"2,400+" },
    { label:"Tokens processed monthly", value:"14B+" },
    { label:"Enterprise retention", value:"99%" },
    { label:"Countries served", value:"60+" },
  ];

  return (
    <div className="flex flex-col min-h-screen" data-screen-label="01 About">
      <Nav theme={tweaks.theme} onToggleTheme={()=>setTweak('theme', tweaks.theme==='dark'?'light':'dark')} onOpenTweaks={()=>setTweaksOpen(o=>!o)}/>
      <Hero t={tweaks}/>
      {tweaks.showStats && <Stats items={achievements}/>}
      <About t={tweaks}/>
      <Footer/>
      <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} tweaks={tweaks} setTweak={setTweak} onReset={onReset}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
