<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scanner Card Stream</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg-0: #05060a;
    --bg-1: #0a0b14;
    --ink-0: #f4f2ff;
    --ink-1: #c8c4e0;
    --ink-2: #706a8f;
    --violet: #a78bfa;
    --indigo: #6366f1;
  }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--bg-0);
    color: var(--ink-0);
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .font-serif { font-family: 'Instrument Serif', serif; }

  /* Ambient dark backdrop */
  .backdrop {
    position: fixed; inset: 0;
    background:
      radial-gradient(900px 500px at 50% 50%, rgba(99,102,241,0.14), transparent 65%),
      linear-gradient(#05060a, #070815);
    z-index: 0;
  }
  .grid-overlay {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    z-index: 1;
    pointer-events: none;
  }
  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.8) 100%);
  }

  @keyframes glitch {
    0%,100% { opacity: 1 }
    50% { opacity: 0.92 }
  }
  .animate-glitch { animation: glitch 0.6s infinite linear alternate-reverse; }

  @keyframes scanPulse {
    0% { opacity: 0.8; transform: translate(-50%, -50%) scaleY(1); }
    100% { opacity: 1; transform: translate(-50%, -50%) scaleY(1.04); }
  }
  .animate-scan-pulse { animation: scanPulse 1.5s infinite alternate ease-in-out; }

  @keyframes pipBlink {
    0%, 70%, 100% { opacity: 1; }
    75%, 85% { opacity: 0.2; }
  }
  .pip-blink { animation: pipBlink 2.2s infinite ease-in-out; }

  .card-wrapper { --clip-right: 0%; --clip-left: 0%; }
  .card-normal { clip-path: inset(0 0 0 var(--clip-right, 0%)); }
  .card-ascii  { clip-path: inset(0 calc(100% - var(--clip-left, 0%)) 0 0); }

  .hairline { border: 1px solid rgba(255,255,255,0.08); }
  .chip {
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(8px);
  }

  .scroll-hide::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="backdrop"></div>
<div class="grid-overlay"></div>
<div class="vignette"></div>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// -------- Card imagery (Unsplash — credit-card-ish abstract / fintech tones) --------
const defaultCardImages = [
  "https://images.unsplash.com/photo-1634733988138-bf2c3a2a13fa?w=800&q=80&auto=format&fit=crop",
  "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=800&q=80&auto=format&fit=crop",
  "https://images.unsplash.com/photo-1580508174046-170816f65662?w=800&q=80&auto=format&fit=crop",
  "https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=800&q=80&auto=format&fit=crop",
  "https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=800&q=80&auto=format&fit=crop",
];

const ASCII_CHARS = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789(){}[]<>;:,._-+=!@#$%^&*|\\/\"'`~?";
const generateCode = (width, height) => {
  let text = "";
  for (let i = 0; i < width * height; i++) text += ASCII_CHARS[Math.floor(Math.random() * ASCII_CHARS.length)];
  let out = "";
  for (let i = 0; i < height; i++) out += text.substring(i * width, (i + 1) * width) + "\n";
  return out;
};

function ScannerCardStream({
  showControls = true,
  showSpeed = true,
  initialSpeed = 35,
  direction = -1,
  cardImages = defaultCardImages,
  repeat = 6,
  cardGap = 60,
  friction = 1.0,
  scanEffect = 'scramble',
}) {
  const [speed, setSpeed] = useState(initialSpeed);
  const [isPaused, setIsPaused] = useState(false);
  const [isScanning, setIsScanning] = useState(false);
  const [scanCount, setScanCount] = useState(0);

  const cards = useMemo(() => {
    const total = cardImages.length * repeat;
    return Array.from({ length: total }, (_, i) => ({
      id: i,
      image: cardImages[i % cardImages.length],
      ascii: generateCode(Math.floor(400 / 6.5), Math.floor(250 / 13)),
    }));
  }, [cardImages, repeat]);

  const cardLineRef = useRef(null);
  const originalAscii = useRef(new Map());

  const stateRef = useRef({
    position: 0, velocity: initialSpeed, direction: direction, isDragging: false,
    lastMouseX: 0, lastTime: performance.now(),
    cardLineWidth: (400 + cardGap) * cards.length,
    friction, minVelocity: 35, isPaused: false,
  });

  const scannerState = useRef({ isScanning: false });

  // keep refs in sync with latest props/state without re-running the big effect
  useEffect(() => { stateRef.current.friction = friction; }, [friction]);
  useEffect(() => { stateRef.current.isPaused = isPaused; }, [isPaused]);

  const toggleAnimation = useCallback(() => setIsPaused(p => !p), []);
  const resetPosition = useCallback(() => {
    if (cardLineRef.current) {
      stateRef.current.position = cardLineRef.current.parentElement?.offsetWidth || 0;
      stateRef.current.velocity = initialSpeed;
      stateRef.current.direction = direction;
      setIsPaused(false);
    }
  }, [initialSpeed, direction]);
  const changeDirection = useCallback(() => { stateRef.current.direction *= -1; }, []);
  const boost = useCallback(() => { stateRef.current.velocity = Math.min(1200, stateRef.current.velocity + 300); }, []);

  useEffect(() => {
    const cardLine = cardLineRef.current;
    if (!cardLine) return;

    cards.forEach(c => originalAscii.current.set(c.id, c.ascii));
    let animationFrameId;

    const runScrambleEffect = (element, cardId) => {
      if (element.dataset.scrambling === 'true') return;
      element.dataset.scrambling = 'true';
      const original = originalAscii.current.get(cardId) || '';
      let count = 0;
      const max = 10;
      const int = setInterval(() => {
        element.textContent = generateCode(Math.floor(400/6.5), Math.floor(250/13));
        count++;
        if (count >= max) {
          clearInterval(int);
          element.textContent = original;
          delete element.dataset.scrambling;
        }
      }, 30);
    };

    let scannedCounter = 0;
    const updateCardEffects = () => {
      const scannerX = window.innerWidth / 2;
      const scannerWidth = 8;
      const scannerLeft = scannerX - scannerWidth/2;
      const scannerRight = scannerX + scannerWidth/2;
      let anyCardIsScanning = false;
      cardLine.querySelectorAll(".card-wrapper").forEach((wrapper, index) => {
        const rect = wrapper.getBoundingClientRect();
        const normalCard = wrapper.querySelector(".card-normal");
        const asciiCard = wrapper.querySelector(".card-ascii");
        const asciiContent = asciiCard.querySelector('pre');
        if (rect.left < scannerRight && rect.right > scannerLeft) {
          anyCardIsScanning = true;
          if (scanEffect === 'scramble' && wrapper.dataset.scanned !== 'true') {
            runScrambleEffect(asciiContent, index);
            scannedCounter++;
          }
          wrapper.dataset.scanned = 'true';
          const intersectLeft = Math.max(scannerLeft - rect.left, 0);
          const intersectRight = Math.min(scannerRight - rect.left, rect.width);
          normalCard.style.setProperty("--clip-right", `${(intersectLeft/rect.width)*100}%`);
          asciiCard.style.setProperty("--clip-left",  `${(intersectRight/rect.width)*100}%`);
        } else {
          if (wrapper.dataset.scanned === 'true') delete wrapper.dataset.scanned;
          if (rect.right < scannerLeft) {
            normalCard.style.setProperty("--clip-right", "100%");
            asciiCard.style.setProperty("--clip-left",  "100%");
          } else {
            normalCard.style.setProperty("--clip-right", "0%");
            asciiCard.style.setProperty("--clip-left",  "0%");
          }
        }
      });
      if (anyCardIsScanning !== scannerState.current.isScanning) setIsScanning(anyCardIsScanning);
      scannerState.current.isScanning = anyCardIsScanning;
    };

    // Auto-play only — no user interaction.

    const onResize = () => {};
    window.addEventListener('resize', onResize);

    let lastScanReport = 0;

    const animate = (currentTime) => {
      const deltaTime = (currentTime - stateRef.current.lastTime) / 1000;
      stateRef.current.lastTime = currentTime;

      if (!stateRef.current.isPaused && !stateRef.current.isDragging) {
        if (stateRef.current.velocity > stateRef.current.minVelocity) {
          stateRef.current.velocity *= stateRef.current.friction;
        }
        // clamp delta to avoid huge jumps after tab-blur / long frames (causes jitter)
        const dt = Math.min(deltaTime, 1/30);
        stateRef.current.position += stateRef.current.velocity * stateRef.current.direction * dt;
        // throttle setState for speed display (every 500ms, not every 100ms)
        if (currentTime - lastScanReport > 500) {
          setSpeed(Math.round(stateRef.current.velocity));
          setScanCount(scannedCounter);
          lastScanReport = currentTime;
        }
      }
      const { position, cardLineWidth } = stateRef.current;
      const containerWidth = cardLine.parentElement?.offsetWidth || 0;
      if (position < -cardLineWidth) stateRef.current.position = containerWidth;
      else if (position > containerWidth) stateRef.current.position = -cardLineWidth;
      cardLine.style.transform = `translate3d(${stateRef.current.position.toFixed(2)}px, 0, 0)`;

      updateCardEffects();

      animationFrameId = requestAnimationFrame(animate);
    };
    animationFrameId = requestAnimationFrame(animate);

    return () => {
      cancelAnimationFrame(animationFrameId);
      window.removeEventListener('resize', onResize);
    };
  }, [cards, cardGap, scanEffect]);

  return (
    <main className="relative w-screen h-screen flex items-center justify-center overflow-hidden" style={{zIndex:3}}>
      {/* ───────── Top chrome ───────── */}
      <header className="absolute top-0 left-0 right-0 px-8 pt-6 flex items-start justify-between z-30 pointer-events-none">
        <div className="pointer-events-auto flex items-center gap-3">
          <div className="w-8 h-8 rounded-md hairline flex items-center justify-center bg-white/[0.02]">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" strokeWidth="1.8">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <path d="M2 10h20"/>
              <path d="M6 15h3"/>
            </svg>
          </div>
          <div className="leading-tight">
            <div className="text-[13px] tracking-[0.24em] font-mono uppercase text-white/90">Scanner // Card Stream</div>
            <div className="text-[11px] font-mono text-white/35 tracking-wider">v0.4.2 · darknet build</div>
          </div>
        </div>
        <div className="pointer-events-auto flex items-center gap-2 font-mono text-[11px] text-white/50">
          <span className="chip px-2.5 py-1 rounded-md flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 pip-blink"></span>
            SECURE CHANNEL
          </span>
          <span className="chip px-2.5 py-1 rounded-md">NODE · US-E2</span>
          <span className="chip px-2.5 py-1 rounded-md">04:24 UTC</span>
        </div>
      </header>

      {/* corner brackets */}
      <div className="pointer-events-none absolute inset-6 z-20">
        {['top-0 left-0 border-t border-l','top-0 right-0 border-t border-r','bottom-0 left-0 border-b border-l','bottom-0 right-0 border-b border-r'].map((cls,i)=>(
          <div key={i} className={`absolute ${cls} border-white/20 w-5 h-5`}></div>
        ))}
      </div>

      {/* scanner line (CSS-only, GPU layer) */}
      <div
        className={`scanner-line absolute top-1/2 left-1/2 h-[320px] w-0.5 -translate-x-1/2 -translate-y-1/2 bg-gradient-to-b from-transparent via-violet-400 to-transparent rounded-full transition-opacity duration-300 z-20 pointer-events-none ${isScanning ? 'opacity-100' : 'opacity-70'}`}
        style={{ boxShadow: `0 0 10px #a78bfa, 0 0 22px #8b5cf6, 0 0 45px #6366f1`, willChange: 'transform, opacity' }}
      />

      {/* scanner reticle / crosshair markings */}
      <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-20" style={{width: 520, height: 360}}>
        {/* top label */}
        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-full pb-2 font-mono text-[10px] tracking-[0.3em] text-violet-300/80 whitespace-nowrap">
          ▼ INTERCEPT ZONE ▼
        </div>
        {/* bottom telemetry */}
        <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-full pt-2 flex items-center gap-3 font-mono text-[10px] tracking-[0.2em] text-white/40 whitespace-nowrap">
          <span>Δ {speed}px/s</span>
          <span className="w-1 h-1 rounded-full bg-white/30"></span>
          <span>SCANNED · {scanCount.toString().padStart(4,'0')}</span>
          <span className="w-1 h-1 rounded-full bg-white/30"></span>
          <span className={isScanning ? 'text-violet-300' : 'text-white/40'}>
            {isScanning ? '◉ LOCK' : '○ IDLE'}
          </span>
        </div>
        {/* side ticks */}
        <div className="absolute left-1/2 -translate-x-1/2 top-0 w-[1px] h-4 bg-violet-400/60"></div>
        <div className="absolute left-1/2 -translate-x-1/2 bottom-0 w-[1px] h-4 bg-violet-400/60"></div>
      </div>

      {/* ───────── Card line ───────── */}
      <div className="absolute w-screen h-[250px] flex items-center z-10">
        <div
          ref={cardLineRef}
          className="flex items-center whitespace-nowrap select-none will-change-transform pointer-events-none"
          style={{ gap: `${cardGap}px` }}
        >
          {cards.map(card => (
            <div key={card.id} className="card-wrapper relative w-[400px] h-[250px] shrink-0">
              <div className="card-normal card absolute top-0 left-0 w-full h-full rounded-[15px] overflow-hidden bg-transparent z-[2]"
                   style={{ boxShadow: '0 15px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06) inset' }}>
                <img src={card.image} alt="" className="w-full h-full object-cover rounded-[15px] brightness-110 contrast-110" />
                <div className="absolute inset-0 rounded-[15px] pointer-events-none"
                     style={{background: 'linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.45) 100%)'}}></div>
                {/* tiny corner label */}
                <div className="absolute top-3 left-3 font-mono text-[9px] tracking-[0.25em] text-white/70">
                  BIN · {(41000 + card.id * 37).toString().slice(0,4)}
                </div>
                <div className="absolute bottom-3 right-3 font-mono text-[9px] tracking-[0.2em] text-white/60">
                  •••• {(1234 + card.id * 7).toString().padStart(4,'0').slice(-4)}
                </div>
              </div>
              <div className="card-ascii card absolute top-0 left-0 w-full h-full rounded-[15px] overflow-hidden bg-transparent z-[1]">
                <pre className="ascii-content absolute top-0 left-0 w-full h-full font-mono text-[11px] leading-[13px] overflow-hidden whitespace-pre m-0 p-0 text-left align-top box-border animate-glitch"
                     style={{
                       color: 'rgba(220,210,255,0.65)',
                       WebkitMaskImage: 'linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.35) 80%, rgba(0,0,0,0.15) 100%)',
                       maskImage: 'linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.35) 80%, rgba(0,0,0,0.15) 100%)',
                     }}>
                  {card.ascii}
                </pre>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ───────── Bottom status strip (read-only) ───────── */}
      <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-30 flex items-center gap-3 chip rounded-full px-4 py-2 font-mono text-[10px] tracking-[0.25em] text-white/60">
        <span className="w-1.5 h-1.5 rounded-full bg-violet-400 pip-blink"></span>
        <span>AUTO · STREAM</span>
        <span className="w-px h-3 bg-white/10"></span>
        <span className="tabular-nums">{String(speed).padStart(4,' ')} <span className="text-white/30">px/s</span></span>
        <span className="w-px h-3 bg-white/10"></span>
        <span className="tabular-nums">→ {stateRef.current.direction < 0 ? 'WEST' : 'EAST'}</span>
      </div>

      {showSpeed && (
        <div className="absolute top-24 right-8 z-30 text-right font-mono text-white/50">
          <div className="text-[10px] tracking-[0.3em] text-white/40">VELOCITY</div>
          <div className="font-serif text-5xl text-white/90 tabular-nums leading-none mt-1">
            {String(speed).padStart(3,'0')}
          </div>
          <div className="text-[10px] tracking-[0.25em] mt-1 text-white/40">PX · SEC⁻¹</div>
        </div>
      )}

      {/* hint */}
      <div className="absolute bottom-8 right-8 z-30 font-mono text-[10px] tracking-[0.2em] text-white/30">
        ⟳ continuous · read-only
      </div>
    </main>
  );
}

function CtrlBtn({ children, onClick, title }) {
  return (
    <button
      onClick={onClick}
      title={title}
      className="w-8 h-8 rounded-full flex items-center justify-center text-white/70 hover:text-white hover:bg-white/10 transition-colors"
    >
      {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ScannerCardStream />);
</script>
</body>
</html>
